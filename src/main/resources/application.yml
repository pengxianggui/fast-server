server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: fast-server
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java #重启目录
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:mysql://${DB_IP:127.0.0.1}:${DB_PORT:3306}/fast-server?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASS:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:/schema.sql
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 线程池配置
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 200
        keep-alive: 60s
      thread-name-prefix: ${spring.application.name}-async-
    scheduling:
      pool:
        size: 3
        thread-name-prefix: ${spring.application.name}-schedule-

logging:
  level:
    root: info

# mybatis-plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations:
    - classpath*:/mapper/**/*.xml
    - classpath*:com/gitee/sunchenbin/mybatis/actable/mapping/*/*.xml

# mybatis-enhance-actable 配置(详见:https://www.yuque.com/sunchenbin/actable/ag3y1y)
actable:
  table:
    auto: update
  model:
    pack: io.github.pengxianggui.server.system.model.entity
  database:
    type: mysql

